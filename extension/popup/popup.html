<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 16px; font-family: 'Pretendard', sans-serif; font-size: 13px; }
    h2 { margin: 0 0 12px; font-size: 15px; }
    .status { color: #666; }
    .toggle { margin-top: 12px; display: flex; align-items: center; gap: 8px; }
    input[type=checkbox] { width: 16px; height: 16px; cursor: pointer; }
  </style>
</head>
<body>
  <h2>🇰🇷 Bilibili 한국어</h2>
  <div class="status" id="status">로딩 중...</div>
  <div class="toggle">
    <input type="checkbox" id="enabled" checked>
    <label for="enabled">한국어 변환 활성화</label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
